<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Pointy-top hexagon centered at 16,16 -->
  <polygon
    points="16,2 29,9.5 29,22.5 16,30 3,22.5 3,9.5"
    fill="rgba(245,166,35,0.08)"
    stroke="#F5A623"
    stroke-width="1.5"
    stroke-linejoin="round"
  />
  <!-- F centered: visual mass centered at x=16, y=16 -->
  <!-- Vertical bar -->
  <line x1="13" y1="10" x2="13" y2="22" stroke="#F5A623" stroke-width="2" stroke-linecap="round"/>
  <!-- Top horizontal -->
  <line x1="13" y1="10" x2="21" y2="10" stroke="#F5A623" stroke-width="2" stroke-linecap="round"/>
  <!-- Mid horizontal -->
  <line x1="13" y1="16" x2="19.5" y2="16" stroke="#F5A623" stroke-width="1.75" stroke-linecap="round"/>
</svg>
