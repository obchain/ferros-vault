specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: VaultFactory
    network: sepolia
    source:
      address: "0x01BbE74E7e8bC7545Db661a97948889F488f798D"
      abi: VaultFactory
      startBlock: 10748121
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Vault
      abis:
        - name: VaultFactory
          file: ./abis/VaultFactory.json
      eventHandlers:
        - event: VaultCreated(indexed address,indexed address,indexed address)
          handler: handleVaultCreated
      file: ./src/factory.ts
templates:
  - kind: ethereum
    name: YieldVault
    network: sepolia
    source:
      abi: YieldVault
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Vault
        - Deposit
        - Withdraw
        - YieldAccrual
        - User
        - VaultDailySnapshot
      abis:
        - name: YieldVault
          file: ./abis/YieldVault.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleWithdraw
        - event: Harvested(uint256,uint256)
          handler: handleHarvested
      file: ./src/vault.ts
