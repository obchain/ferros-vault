  <rect x="48" y="232" width="215" height="68" fill="#0E1219" stroke="#F5A623" stroke-width="1.5" rx="2"/>
  <rect x="48" y="232" width="215" height="18" fill="#F5A623" opacity="0.08" rx="2"/>
  <text x="156" y="245" fill="#F5A623" font-size="10" font-family="'IBM Plex Mono',monospace" text-anchor="middle" letter-spacing="2" font-weight="600">YIELD VAULT</text>
  <text x="156" y="263" fill="#6B7A92" font-size="8" font-family="'IBM Plex Mono',monospace" text-anchor="middle">ERC-4626 · UUPS Proxy</text>
  <text x="156" y="276" fill="#6B7A92" font-size="8" font-family="'IBM Plex Mono',monospace" text-anchor="middle">ReentrancyGuard · Ownable2Step</text>
  <text x="156" y="289" fill="#6B7A92" font-size="8" font-family="'IBM Plex Mono',monospace" text-anchor="middle">0xA079…9C18</text>

  <!-- VaultFactory box -->
  <rect x="323" y="232" width="215" height="68" fill="#0E1219" stroke="#2A3A5C" stroke-width="1.5" rx="2"/>
  <rect x="323" y="232" width="215" height="18" fill="#2A3A5C" opacity="0.4" rx="2"/>
  <text x="430" y="245" fill="#A8B4C4" font-size="10" font-family="'IBM Plex Mono',monospace" text-anchor="middle" letter-spacing="2" font-weight="600">VAULT FACTORY</text>
  <text x="430" y="263" fill="#6B7A92" font-size="8" font-family="'IBM Plex Mono',monospace" text-anchor="middle">ERC-1967 Proxy Deployer</text>
  <text x="430" y="276" fill="#6B7A92" font-size="8" font-family="'IBM Plex Mono',monospace" text-anchor="middle">Ownable2Step · nonReentrant</text>
  <text x="430" y="289" fill="#6B7A92" font-size="8" font-family="'IBM Plex Mono',monospace" text-anchor="middle">0x01BB…798D</text>

  <!-- InterestRateModel box -->
  <rect x="598" y="232" width="215" height="68" fill="#0E1219" stroke="#2A3A5C" stroke-width="1.5" rx="2"/>
  <rect x="598" y="232" width="215" height="18" fill="#2A3A5C" opacity="0.4" rx="2"/>
  <text x="706" y="245" fill="#A8B4C4" font-size="10" font-family="'IBM Plex Mono',monospace" text-anchor="middle" letter-spacing="2" font-weight="600">RATE MODEL</text>
  <text x="706" y="263" fill="#6B7A92" font-size="8" font-family="'IBM Plex Mono',monospace" text-anchor="middle">Two-slope Utilization</text>
  <text x="706" y="276" fill="#6B7A92" font-size="8" font-family="'IBM Plex Mono',monospace" text-anchor="middle">Compound V2-inspired</text>
  <text x="706" y="289" fill="#6B7A92" font-size="8" font-family="'IBM Plex Mono',monospace" text-anchor="middle">Pure math · No state</text>

