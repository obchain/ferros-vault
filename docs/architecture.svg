  <line x1="323" y1="258" x2="263" y2="258" stroke="#2A3A5C" stroke-width="1.2" marker-end="url(#arrow-muted)"/>
  <text x="280" y="252" fill="#4A5568" font-size="7" font-family="'IBM Plex Mono',monospace">deploys</text>

