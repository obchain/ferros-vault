<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 530" width="860" height="530">
  <defs>
    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F5A623"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00D4FF"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00E676"/>
    </marker>
    <marker id="arrow-muted" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4A5568"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="530" fill="#080B10" rx="6"/>

  <!-- Subtle hex grid -->
  <pattern id="hex" x="0" y="0" width="60" height="104" patternUnits="userSpaceOnUse">
    <path d="M30 0 L60 17.3 L60 52 L30 69.3 L0 52 L0 17.3Z" fill="none" stroke="#1E2840" stroke-width="0.4" opacity="0.5"/>
    <path d="M30 34.6 L60 52 L60 86.6 L30 104 L0 86.6 L0 52Z" fill="none" stroke="#1E2840" stroke-width="0.4" opacity="0.5"/>
  </pattern>
  <rect width="860" height="530" fill="url(#hex)"/>

  <!-- Title -->
  <text x="430" y="28" fill="#F5A623" font-size="12" font-family="'IBM Plex Mono',monospace" text-anchor="middle" letter-spacing="5" font-weight="600">FERROS VAULT — SYSTEM ARCHITECTURE</text>
  <rect x="160" y="33" width="540" height="1" fill="#F5A623" opacity="0.3"/>

  <!-- ── LAYER 0: USER ── -->
  <circle cx="430" cy="68" r="18" fill="#0E1219" stroke="#F5A623" stroke-width="1.5"/>
  <!-- user icon -->
  <circle cx="430" cy="63" r="5" fill="#F5A623"/>
  <path d="M419,78 Q430,70 441,78" fill="#F5A623"/>
  <text x="430" y="97" fill="#F5A623" font-size="9" font-family="'IBM Plex Mono',monospace" text-anchor="middle" letter-spacing="3">USER WALLET</text>

  <!-- Arrow: User → Frontend -->
  <line x1="430" y1="101" x2="430" y2="120" stroke="#F5A623" stroke-width="1.2" marker-end="url(#arrow-amber)"/>
  <text x="438" y="113" fill="#F5A623" font-size="8" font-family="'IBM Plex Mono',monospace" opacity="0.7">RPC</text>

  <!-- ── LAYER 1: FRONTEND ── -->
  <rect x="70" y="124" width="720" height="58" fill="#0E1219" stroke="#F5A623" stroke-width="1.5" rx="2"/>
  <rect x="70" y="124" width="4" height="58" fill="#F5A623" rx="1"/>
  <text x="420" y="143" fill="#F5A623" font-size="11" font-family="'IBM Plex Mono',monospace" text-anchor="middle" letter-spacing="3" font-weight="600">FRONTEND</text>
  <text x="420" y="161" fill="#8A96A8" font-size="9" font-family="'IBM Plex Mono',monospace" text-anchor="middle" letter-spacing="1">Next.js 14  ·  wagmi v2  ·  RainbowKit v2  ·  Apollo Client  ·  Recharts</text>
  <!-- Layer badge -->
  <rect x="74" y="169" width="716" height="13" fill="#131820" opacity="0.6"/>
  <text x="420" y="179" fill="#4A5568" font-size="8" font-family="'IBM Plex Mono',monospace" text-anchor="middle" letter-spacing="2">PRESENTATION LAYER</text>

  <!-- Arrow: Frontend → YieldVault -->
  <line x1="230" y1="182" x2="170" y2="228" stroke="#F5A623" stroke-width="1.2" marker-end="url(#arrow-amber)"/>
  <text x="178" y="210" fill="#F5A623" font-size="7.5" font-family="'IBM Plex Mono',monospace" opacity="0.8">deposit()</text>
  <text x="166" y="220" fill="#F5A623" font-size="7.5" font-family="'IBM Plex Mono',monospace" opacity="0.8">withdraw()</text>

  <!-- Arrow: Frontend → VaultFactory -->
