  <text x="162" y="338" fill="#00E676" font-size="7.5" font-family="'IBM Plex Mono',monospace" opacity="0.85">delegate</text>

  <!-- Events arrow: contracts → The Graph -->
  <path d="M263,280 Q460,320 598,393" fill="none" stroke="#2A3A5C" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow-muted)"/>
  <text x="420" y="322" fill="#4A5568" font-size="7.5" font-family="'IBM Plex Mono',monospace" text-anchor="middle">emit events</text>

  <!-- UUPS Implementation label -->
  <rect x="48" y="308" width="215" height="16" fill="#131820" rx="0"/>
  <text x="156" y="320" fill="#4A5568" font-size="7.5" font-family="'IBM Plex Mono',monospace" text-anchor="middle" letter-spacing="1.5">IMPL: 0xe67F…537a5</text>

  <!-- ── LAYER 3: STRATEGY + GRAPH ── -->

  <!-- MockYieldSource box -->
  <rect x="48" y="372" width="215" height="62" fill="#0E1219" stroke="#00E676" stroke-width="1.5" rx="2"/>
  <rect x="48" y="372" width="215" height="18" fill="#00E676" opacity="0.07" rx="2"/>
  <text x="156" y="385" fill="#00E676" font-size="10" font-family="'IBM Plex Mono',monospace" text-anchor="middle" letter-spacing="2" font-weight="600">MOCK YIELD SOURCE</text>
  <text x="156" y="403" fill="#6B7A92" font-size="8" font-family="'IBM Plex Mono',monospace" text-anchor="middle">IYieldStrategy · 10% APY</text>
  <text x="156" y="416" fill="#6B7A92" font-size="8" font-family="'IBM Plex Mono',monospace" text-anchor="middle">Token minting · Testnet only</text>
  <text x="156" y="427" fill="#4A5568" font-size="7.5" font-family="'IBM Plex Mono',monospace" text-anchor="middle">0x31d9…1036</text>

  <!-- The Graph box -->
  <rect x="598" y="372" width="215" height="62" fill="#0E1219" stroke="#00D4FF" stroke-width="1.5" rx="2"/>
  <rect x="598" y="372" width="215" height="18" fill="#00D4FF" opacity="0.07" rx="2"/>
  <text x="706" y="385" fill="#00D4FF" font-size="10" font-family="'IBM Plex Mono',monospace" text-anchor="middle" letter-spacing="2" font-weight="600">THE GRAPH</text>
  <text x="706" y="403" fill="#6B7A92" font-size="8" font-family="'IBM Plex Mono',monospace" text-anchor="middle">AssemblyScript Mappings</text>
  <text x="706" y="416" fill="#6B7A92" font-size="8" font-family="'IBM Plex Mono',monospace" text-anchor="middle">Vault · Deposit · Withdraw · APY</text>
  <text x="706" y="427" fill="#4A5568" font-size="7.5" font-family="'IBM Plex Mono',monospace" text-anchor="middle">Subgraph Studio</text>

  <!-- USDC token box (MockERC20) -->
  <rect x="323" y="372" width="215" height="62" fill="#0E1219" stroke="#2A3A5C" stroke-width="1.5" rx="2"/>
  <rect x="323" y="372" width="215" height="18" fill="#2A3A5C" opacity="0.3" rx="2"/>
  <text x="430" y="385" fill="#A8B4C4" font-size="10" font-family="'IBM Plex Mono',monospace" text-anchor="middle" letter-spacing="2" font-weight="600">MOCK USDC</text>
  <text x="430" y="403" fill="#6B7A92" font-size="8" font-family="'IBM Plex Mono',monospace" text-anchor="middle">ERC-20 · 6 decimals</text>
  <text x="430" y="416" fill="#6B7A92" font-size="8" font-family="'IBM Plex Mono',monospace" text-anchor="middle">Mintable · Testnet token</text>
  <text x="430" y="427" fill="#4A5568" font-size="7.5" font-family="'IBM Plex Mono',monospace" text-anchor="middle">0x38C3…F744</text>

  <!-- YieldVault ↔ MockUSDC arrow -->
  <line x1="263" y1="266" x2="323" y2="400" stroke="#2A3A5C" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ── NETWORK BADGE ── -->
  <rect x="48" y="452" width="764" height="24" fill="#0E1219" stroke="#1E2840" stroke-width="1" rx="2"/>
  <circle cx="68" cy="464" r="5" fill="#00E676" opacity="0.8"/>
  <circle cx="68" cy="464" r="5" fill="none" stroke="#00E676" stroke-width="0.5">
    <animate attributeName="r" values="5;9;5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="82" y="468" fill="#6B7A92" font-size="8.5" font-family="'IBM Plex Mono',monospace" letter-spacing="2">ETHEREUM SEPOLIA  ·  CHAIN ID: 11155111  ·  SOLIDITY 0.8.24  ·  OZ v5 UPGRADEABLE</text>

  <!-- ── LEGEND ── -->
  <line x1="430" y1="488" x2="460" y2="488" stroke="#F5A623" stroke-width="1.5"/>
  <text x="465" y="491" fill="#6B7A92" font-size="8" font-family="'IBM Plex Mono',monospace">User interaction</text>
  <line x1="570" y1="488" x2="600" y2="488" stroke="#00E676" stroke-width="1.5"/>
  <text x="605" y="491" fill="#6B7A92" font-size="8" font-family="'IBM Plex Mono',monospace">Strategy call</text>
  <line x1="685" y1="488" x2="715" y2="488" stroke="#00D4FF" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="720" y="491" fill="#6B7A92" font-size="8" font-family="'IBM Plex Mono',monospace">Event / data</text>

  <text x="48" y="491" fill="#4A5568" font-size="8" font-family="'IBM Plex Mono',monospace" letter-spacing="2">FERROS VAULT v1.0</text>
</svg>
