[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
ffi = false
fs_permissions = [{ access = "read-write", path = "../deployments/" }]

[profile.default.fuzz]
runs = 10000
max_test_rejects = 65536

[rpc_endpoints]
ethereum_sepolia = "${ETHEREUM_SEPOLIA_RPC}"

[etherscan]
ethereum_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.etherscan.io/api" }
